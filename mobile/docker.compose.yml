version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       attendance_system
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ankrah0000
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
